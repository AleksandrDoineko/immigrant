<body>

    </nav>

    <section class="content">
        <h1>AAA Page</h1>
        <p>This is the second page. Below is a simple interactive counter.</p>

        <div class="counter-box">
            <h2 id="count">0</h2>
            <button onclick="increment()">Increase</button>
        </div>
    </section>

    <script>
        let count = 0;
        function increment() {
            count++;
            document.getElementById("count").textContent = count;
        }
    </script>
</body>
